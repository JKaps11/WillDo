<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" fill="none">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="12" fill="url(#bg-gradient)"/>

  <!-- Step 1: Create Skill -->
  <g transform="translate(40, 30)">
    <rect width="120" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <circle cx="60" cy="35" r="20" fill="#3b82f6"/>
    <text x="60" y="42" text-anchor="middle" fill="white" font-size="18">1</text>
    <text x="60" y="70" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Create</text>
    <text x="60" y="86" text-anchor="middle" fill="#64748b" font-size="11">Skill</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M170 80 L195 80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M190 75 L200 80 L190 85" fill="#94a3b8"/>

  <!-- Step 2: Add Sub-skills -->
  <g transform="translate(200, 30)">
    <rect width="120" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <circle cx="60" cy="35" r="20" fill="#8b5cf6"/>
    <text x="60" y="42" text-anchor="middle" fill="white" font-size="18">2</text>
    <text x="60" y="70" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Add</text>
    <text x="60" y="86" text-anchor="middle" fill="#64748b" font-size="11">Sub-skills</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M330 80 L355 80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M350 75 L360 80 L350 85" fill="#94a3b8"/>

  <!-- Step 3: Schedule Tasks -->
  <g transform="translate(360, 30)">
    <rect width="120" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <circle cx="60" cy="35" r="20" fill="#f59e0b"/>
    <text x="60" y="42" text-anchor="middle" fill="white" font-size="18">3</text>
    <text x="60" y="70" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Schedule</text>
    <text x="60" y="86" text-anchor="middle" fill="#64748b" font-size="11">Tasks</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M490 80 L515 80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M510 75 L520 80 L510 85" fill="#94a3b8"/>

  <!-- Step 4: Practice Daily -->
  <g transform="translate(520, 30)">
    <rect width="120" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <circle cx="60" cy="35" r="20" fill="#10b981"/>
    <text x="60" y="42" text-anchor="middle" fill="white" font-size="18">4</text>
    <text x="60" y="70" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Practice</text>
    <text x="60" y="86" text-anchor="middle" fill="#64748b" font-size="11">Daily</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M650 80 L675 80" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  <path d="M670 75 L680 80 L670 85" fill="#94a3b8"/>

  <!-- Step 5: Track Progress -->
  <g transform="translate(680, 30)">
    <rect width="100" height="100" rx="8" fill="white" filter="url(#shadow)"/>
    <circle cx="50" cy="35" r="20" fill="#ec4899"/>
    <text x="50" y="42" text-anchor="middle" fill="white" font-size="18">5</text>
    <text x="50" y="70" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="600">Track</text>
    <text x="50" y="86" text-anchor="middle" fill="#64748b" font-size="11">Progress</text>
  </g>
</svg>
